name: 刷步数

on:
  schedule:
    - cron: '22 0,2,4,6,8,14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
          # 新增：拉取完整历史，避免分支校验问题
          fetch-depth: 0
          # 新增：切换到master分支（确保推送分支正确）
          ref: master

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        run: |
          # 1. 全局配置Git用户（避免目录权限问题）
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          # 2. 仅添加token相关文件（避免无关文件触发提交）
          git add encrypted_tokens.data || echo "无token文件需要提交"
          # 3. 仅当有变更时才提交（核心：避免空提交报错）
          git commit -m "persist tokens trigger by ${{ github.event_name }}" || echo "工作区无变更，无需提交"
          # 4. 推送（强制推送仅应急，优先保证推送成功）
          git push origin master || echo "推送失败（无变更/权限问题）"
